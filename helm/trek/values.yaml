config:
  name: trek
  namespace: trek
  imageName: docker.io/asdfghjklxd/trek
  imageTag: latest
  imagePullPolicy: Always
  port: 3000
  forceHttps: true

# Optional image pull secrets for private registries
imagePullSecrets: []
  # - name: my-registry-secret

app:
  replicas: 1

ingress:
  ingressName: trek-ingress
  tlsCertName: trek-tls
  hostName: trek.georgetay.com

service:
  serviceName: trek-service

configmap:
  configmapName: trek-config

secret:
  secretName: trek-secret
  encryptedSecretData: 

  oidcSecretName: oidc-trek-secret
  encryptedOidcIssuer: 
  encryptedOidcClientId: 
  encryptedOidcClientSecret: 
  encryptedOidcDisplayName: 
  encryptedOidcOnly: 

pvc:
  dataPvcName: trek-data
  uploadPvcName: trek-uploads

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

postgresql:
  enabled: true
  architecture: replication

  auth:
    username: "trek"
    database: "trek"
    existingSecret: "trek-pg"
    secretKeys:
      adminPasswordKey: adminPasswordKey
      userPasswordKey: replicationPasswordKey
      replicationPasswordKey: userPasswordKey

  primary:
    persistence:
      size: 50Gi
    networkPolicy:
      allowExternal: false
      allowExternalEgress: false

  readReplicas:
    replicaCount: 1
    networkPolicy:
      allowExternal: false
      allowExternalEgress: false
